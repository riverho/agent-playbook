# processes/run-task.yaml
# The GENERIC process — the universal loop unit. Every backlog task can be run
# through this when no more specific process applies. This is what makes the
# playbook loop work for any kind of work.
name: run-task
version: 1.1.0
purpose: >-
  Define the canonical, repeatable way to take a single backlog task from
  selection to a recorded, reported outcome — without friction or drift.

source_of_truth:
  master: playbook.yaml
  memory: memory/project-memory.md
  backlog: memory/backlog.yaml

applies_to:
  - any task in memory/backlog.yaml that has no more specific skill/process

required_inputs:
  - a claimed backlog task (status in_progress) with a clear title
  - the task's acceptance_checks — executable shell commands that define "done"
  - any task-specific notes from memory/backlog.yaml

canonical_steps:
  - step: 1
    name: Orient
    requirements:
      - Read playbook.yaml (the fixation) and memory/project-memory.md.
      - Run `pb status` to see backlog and recent journal.
      - Read the task's acceptance_checks — they ARE the definition of done.
  - step: 2
    name: Plan
    requirements:
      - State the smallest change that will make the acceptance_checks pass.
      - Identify which files or artifacts you will touch (all inside the folder).
      - If the task really needs a dedicated process, write one and add it to the index instead.
  - step: 3
    name: Execute
    requirements:
      - Do the work. Stay inside the playbook folder.
      - Prefer reusing existing skills, scripts, and patterns over inventing new ones.
  - step: 4
    name: Verify
    requirements:
      - Run `pb validate` — structural guardrails must be green.
      - Run `pb validate --task <id>` — the task's own checks must pass.
  - step: 5
    name: Record
    requirements:
      - Run `pb record --task <id> --action execute --status <done|blocked> --notes "<what+why>"`.
      - Recording done re-runs the checks and refuses on failure — that is by design.
      - If blocked, note exactly what is needed to unblock.
  - step: 6
    name: Report
    requirements:
      - When a batch of work is complete, run `pb report` to refresh the human artifact.

acceptance_checks:
  - The task's own acceptance_checks exit 0 (enforced by `pb record --status done`).
  - "`pb validate` passes."
  - A journal entry exists for this task with a terminal status (done or blocked).
  - No work happened outside the playbook folder.
