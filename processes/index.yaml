# processes/index.yaml — the canonical process index.
# `pb list processes` reads this. Skills point here by process id or file path.
name: canonical-processes
version: 1.1.0
description: Index of canonical, agent-executable processes in this playbook.

processes:
  - id: run-task
    file: processes/run-task.yaml
    owner: core
    summary: The generic loop unit — how to take ANY backlog task from claim to report.

  - id: install
    file: processes/install.yaml
    owner: core
    summary: How to apply this playbook to a target repo (scaffold → bridge → wire → verify).

  - id: harden
    file: processes/harden.yaml
    owner: core
    summary: Keep the playbook salient across long context, compaction, and handoff.

  - id: release
    file: processes/release.yaml
    owner: core
    summary: Cut a versioned release — bump package.json, tag, push, publish GitHub release.

  - id: use-playbook
    file: processes/use-playbook.yaml
    owner: core
    summary: Drive the playbook from natural language — translate an utterance into the right pb command(s) via the intent grammar in scripts/lib/nl-router.mjs.

  - id: triage-claim
    file: processes/triage-claim.yaml
    owner: core
    summary: Convert narrative input (reflections, user bug lists, subagent reports) into check-gated backlog tasks — the named route from prose to verified work.

# shared_rules apply to every process. The master's `fixation` always wins over these.
shared_rules:
  - Re-anchor to playbook.yaml before acting; it is the source of truth.
  - Use the smallest change that satisfies the task's acceptance_checks.
  - Record the outcome to the journal with `pb record` before moving on.
  - Keep all work inside the playbook folder (carry-on).
