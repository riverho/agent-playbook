name: wiki-news-ingest
version: 1.0.0
purpose: >-
  Run or debug the acquisition and ingest half of wiki-news daily refresh.

canonical_steps:
  - step: 1
    name: Scan blogwatcher
    requirements:
      - Run `BLOGWATCHER_DB=<db> blogwatcher-cli scan`.
      - Save scan counts and failures to the run report.

  - step: 2
    name: Full feed ingest
    requirements:
      - Run `/Users/river/wiki/scripts/rss_deep_ingest.py`.
      - Capture source failures.

  - step: 3
    name: DB delta backfill
    requirements:
      - Run `/Users/river/wiki/scripts/blogwatcher_delta_ingest.py --since <date> --limit <n>`.
      - Record rows considered and new article pages.

  - step: 4
    name: Failure triage
    requirements:
      - For repeated source failures, create a triage proposal.
      - Do not patch mode machinery inline during a monitor run.

acceptance_checks:
  - test -f /Users/river/wiki/scripts/rss_deep_ingest.py
  - test -f /Users/river/wiki/scripts/blogwatcher_delta_ingest.py
  - test -f /Users/river/wiki/scripts/rebuild_news_indexes.py
