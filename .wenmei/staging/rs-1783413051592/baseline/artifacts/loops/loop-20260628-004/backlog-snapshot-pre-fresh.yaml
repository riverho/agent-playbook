  - id: docs-orchestrator-flow
    title: >-
      Update ORCHESTRATOR.md + INSTALL.md to teach the mode-agnostic orchestrator, menu, gaps, and
      flows
    status: done
    skill: harden
    mode: coding
    priority: 1
