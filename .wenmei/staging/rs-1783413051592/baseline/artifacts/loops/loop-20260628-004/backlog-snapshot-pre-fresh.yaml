  - id: mode-catalog
    title: Add modes/index.yaml + two-level menu (pb list modes / pb mode show) with validate sync
    status: done
    skill: harden
    mode: coding
    priority: 1
    notes: >-
      The catalog surface so the manual stops carrying the mode list. Create modes/index.yaml: one
      entry per mode in playbook.yaml's `modes:` map (coding, demo, blogwatch, fable-5), each with a
      `description` and an `abstract` of the process/skill set it carries (summarize, do not
      duplicate, the mode's own indices). Add `pb list modes` (all modes + one-line abstract — the
      "which streamline set?" view) and extend `pb mode show <mode>` to print that mode's skill+
      process pairs (the "what's inside?" view). Wire a sync guardrail into `pb validate`: every
      mode in playbook.yaml `modes:` appears in modes/index.yaml and vice versa, and each referenced
      file parses — a menu that disagrees with the master must fail validation. Behavioral test
      scripts/test-mode-catalog.mjs asserts: `pb list modes` lists all four modes with non-empty
      abstracts; `pb mode show blogwatch` lists its pack-local skill+process; and a deliberately
      desynced index (drop one mode) makes `pb validate` exit non-zero. Carry-on; .mjs only.
    acceptance_checks:
