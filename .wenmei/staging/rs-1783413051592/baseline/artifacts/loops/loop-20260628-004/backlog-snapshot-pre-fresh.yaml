  - id: orchestrator-generic
    title: Parameterize the orchestrator by --mode and lift scaffold config into the mode
    status: done
    skill: harden
    mode: coding
    priority: 2
    dependencies:
      - mode-catalog
    notes: >-
      Generalize scripts/pb-daily-monitor.mjs from blogwatch-welded to mode-agnostic. Add a `--mode
      <id>` flag (default blogwatch for back-compat). The scaffold step must no longer hardcode the
      `watches[]` schema or the `watch-feeds` skill: the MODE declares how it scaffolds its backlog
      (a scaffold descriptor in the mode pack — config path + the skill to plan against), so the
      orchestrator reads `mode.scaffold` rather than baking blogwatch's shape into the script. Every
      planned task still carries an executable acceptance_check (the `--check`), preserving "stop
      when done". Behavioral test scripts/test-orchestrator-generic.mjs: running the generic path
      with --mode blogwatch plans+drains the example watches green (NO regression vs today) and
      asserts the orchestrator source contains no blogwatch-specific scaffold literals (watches[]/
      watch-feeds are read from the mode, not hardcoded). check-daily-monitor.mjs still passes.
    acceptance_checks:
      - node scripts/test-orchestrator-generic.mjs
      - node scripts/check-daily-monitor.mjs
      - node scripts/test-daily-monitor.mjs
      - node scripts/pb.mjs validate
    loop_id: loop-20260628-001
    claimed_at: '2026-06-28T08:14:48.649Z'
    claimed_by: agent
    agent_id: agent
    updated_at: '2026-06-28T08:18:43.986Z'
  - id: scaffold-gap-proposal
    title: >-
      Scaffolding a capability absent from the menu emits a building-plan proposal, not an
      unroutable task
    status: done
    skill: harden
    mode: coding
    priority: 3
    dependencies:
      - orchestrator-generic
    notes: >-
      Close the loop between the menu and the evolution loop. When the scaffold step needs a skill/
      process that is NOT in the active mode's menu (resolved via mode-catalog), the orchestrator
      must NOT plan an unroutable/honor-only task — it appends a structured proposal to
      artifacts/reports/orchestrator-iterations.ndjson with status `pending`, a `target` (new skill
      or process id), and a short `building_plan` (what to create + where to register). The
      heartbeat stays READ-ONLY on its own machinery; building happens in the separate evolution
      loop. Behavioral test scripts/test-scaffold-gap.mjs: feed a synthetic goal needing a missing
      skill and assert exactly one `pending` proposal line is written naming the missing capability
      AND no blocked/unroutable task is created for it; a goal whose skill IS in the menu produces a
      normal planned task and no proposal.
    acceptance_checks:
      - node scripts/test-scaffold-gap.mjs
      - node scripts/pb.mjs validate
    loop_id: loop-20260628-001
    claimed_at: '2026-06-28T08:19:51.783Z'
    claimed_by: agent
    agent_id: agent
    updated_at: '2026-06-28T08:22:36.048Z'
  - id: flow-runner
    title: Add flows/ — run modes in sequence with artifact-dir handoff, fail-fast, one epoch per flow
    status: done
    skill: harden
    mode: coding
    priority: 4
    dependencies:
      - orchestrator-generic
    notes: >-
      The flow runner that turns the orchestrator into a sequencer over the mode catalog. A flow is
      a `flows/<id>.yaml` listing ordered steps, each { mode, input?, output }. Sequencing lives
      ONLY in the flow file — modes carry NO `next:` pointers. Handoff is explicit artifact dirs
      (decided, Fact #2): step A writes its `output` dir; step B's scaffold reads it as `input`.
      Semantics: the whole flow runs under ONE loop epoch; a step whose backlog does not drain
      (blocked/leftover todo) HALTS the flow fail-fast with a non-zero exit and a surfaced error
      (same discipline the daily monitor has today). Add scripts/check-flow.mjs (flows/ structural
      validity: steps reference real modes; input/output dirs are inside the playbook; A.output
      feeds B.input). Behavioral test scripts/test-flow-runner.mjs: a 2-mode toy flow A→B where B
      scaffolds from A's output dir runs A then B and exits 0; and a flow whose first step fails
      halts before running the second (fail-fast).
    acceptance_checks:
      - node scripts/test-flow-runner.mjs
      - node scripts/check-flow.mjs
      - node scripts/pb.mjs validate
    loop_id: loop-20260628-001
    claimed_at: '2026-06-28T08:24:33.119Z'
    claimed_by: agent
    agent_id: agent
    updated_at: '2026-06-28T08:28:50.079Z'
